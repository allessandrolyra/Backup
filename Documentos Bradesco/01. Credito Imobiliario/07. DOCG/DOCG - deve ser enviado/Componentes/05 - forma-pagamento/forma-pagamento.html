<div style="padding: 0mm 4mm">
  <div style="border-top: 1px solid #000">
    <b style="font-size: 14pt">14 - Forma de Pagamento</b>
  </div>
  <div style="border-top: 1px solid #000">
    <input type="checkbox" id="debito" name="ccb_cpinvest_forma_pag_debito" />

  </div>
  <div style="border-top: 1px solid #000">

    <input
      type="checkbox"
      name="ccb_cpinvest_autoriza_debito_limite_credito"
      id="ccb_cpinvest_autoriza_debito_limite_credito"
    />
    <label for="ccb_cpinvest_autoriza_debito_limite_credito">Sim</label>
    <input
      type="checkbox"
      name="ccb_cpinvest_nao_autoriza_debito_limite_credito"
      id="ccb_cpinvest_nao_autoriza_debito_limite_credito"
    />
    <label for="ccb_cpinvest_nao_autoriza_debito_limite_credito">Não</label>
  </div>
  <div style="border-top: 1px solid #000">
    <label>14.2 - Autorização para débitos vencidos, inclusive parciais</label>
    <input
      type="checkbox"
      name="ccb_cpinvest_autoriza_debito_vencido"
      id="ccb_cpinvest_autoriza_debito_vencido"
    />
    <label for="ccb_cpinvest_autoriza_debito_vencido">Sim</label>
    <input
      type="checkbox"
      name="ccb_cpinvest_nao_autoriza_debito_vencido"
      id="ccb_cpinvest_nao_autoriza_debito_vencido"
    />

  <div style="border-top: 1px solid #000">
    <input
      type="checkbox"
      id="debito-conta"
      name="ccb_cpinvest_debito_conta_salario"

  </div>
  <div style="border-top: 1px solid #000">
    <label>14.3 - Autorização para débitos vencidos, inclusive parciais.</label>
    <input
      type="checkbox"
      name="ccb_cpinvest_autoriza_debito_conta_salario_parcial"
    />
    <label for="ccb_cpinvest_autoriza_debito_conta_salario_parcial">Sim</label>
    <input
      type="checkbox"
      name="ccb_cpinvest_nao_autoriza_debito_conta_salario_parcial"

      name="ccb_cpinvest_autoriza_debito_conta_salario_parcial_portabilidade"

      type="checkbox"
